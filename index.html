/* ======================= PLATTEGROND TAB ======================= */
const PLEK_CEL_GROOTTE = 34; // pixels per rooster-cel

let plattegrondMode = 'kaart'; // kaart | lijst
let plattegrondLetterFilter = null;
let plattegrondSelectedCode = null; // laatst aangetikte plekcode (of subcode zoals 'A2a')
let plattegrondSelectedIsHalf = false; // was de tik al direct op een bestaande helft (a/b)?
let plattegrondHalveCheckbox = false;
let plattegrondHalveSuffix = 'a';
let plattegrondZoekQuery = '';
let plattegrondScrollLeft = 0;
let plattegrondScrollTop = 0;

function renderPlattegrond(){
  return plattegrondMode==='kaart' ? renderPlattegrondKaart() : renderPlattegrondLijst();
}

function vindBookingVoorCode(code){
  const target = code.trim().toLowerCase();
  return BOOKINGS.find(b=>{
    const ov = getOverlay(b.id);
    return ov.plek && ov.plek.trim().toLowerCase() === target;
  });
}

function renderPlattegrondKaart(){
  // Bouw een snelle opzoektabel: plekcode (lowercase, getrimd) -> booking, voor kleuring
  const plekBezetting = {};
  BOOKINGS.forEach(b=>{
    const ov = getOverlay(b.id);
    if(ov.plek && ov.plek.trim()){
      plekBezetting[ov.plek.trim().toLowerCase()] = b;
    }
  });

  const breedte = PLATTEGROND_DATA.maxCol * PLEK_CEL_GROOTTE;
  const hoogte = PLATTEGROND_DATA.maxRow * PLEK_CEL_GROOTTE;

  const plekjes = PLATTEGROND_DATA.plekken.map(p=>{
    const left = (p.col - 1) * PLEK_CEL_GROOTTE;
    const top = (p.row - 1) * PLEK_CEL_GROOTTE;
    const gesplitst = isPlekGesplitst(p.code);
    const compartimentClass = p.compartiment ? ' plek-compartiment' : '';

    if(gesplitst){
      const bookingA = vindGesplitsteBooking(p.code, 'a');
      const bookingB = vindGesplitsteBooking(p.code, 'b');
      const statusA = bookingA ? plekStatus(getOverlay(bookingA.id)) : 'vrij';
      const statusB = bookingB ? plekStatus(getOverlay(bookingB.id)) : 'vrij';
      return `<div class="plek-cel${compartimentClass}" style="left:${left}px; top:${top}px; width:${PLEK_CEL_GROOTTE-2}px; height:${PLEK_CEL_GROOTTE-2}px; background:transparent; padding:0;">
        <div class="plek-half plek-half-a plek-${statusA}" data-plek-code="${escapeAttr(p.code+'a')}" data-is-half="1" title="${escapeAttr(p.code)}a${bookingA?' — '+escapeHtml(fullName(bookingA)):' — vrij'}">a</div>
        <div class="plek-half plek-half-b plek-${statusB}" data-plek-code="${escapeAttr(p.code+'b')}" data-is-half="1" title="${escapeAttr(p.code)}b${bookingB?' — '+escapeHtml(fullName(bookingB)):' — vrij'}">b</div>
      </div>`;
    }

    const booking = plekBezetting[p.code.toLowerCase()];
    const status = booking ? plekStatus(getOverlay(booking.id)) : 'vrij';
    const statusLabel = status==='gereserveerd' ? ' — gereserveerd voor ' : status==='bezet' ? ' — ' : ' — vrij';
    return `<div class="plek-cel plek-${status}${compartimentClass}"
      style="left:${left}px; top:${top}px; width:${PLEK_CEL_GROOTTE-2}px; height:${PLEK_CEL_GROOTTE-2}px;"
      data-plek-code="${escapeAttr(p.code)}"
      title="${escapeAttr(p.code)}${statusLabel}${booking ? escapeHtml(fullName(booking)) : ''}">${escapeHtml(p.code)}</div>`;
  }).join('');

  const landmarks = PLATTEGROND_DATA.landmarks.map(l=>{
    if(l.type==='lijn-sloot'){
      const left = (l.colStart - 1) * PLEK_CEL_GROOTTE;
      const top = (l.row - 1) * PLEK_CEL_GROOTTE + PLEK_CEL_GROOTTE/2;
      const breedteLijn = (l.colEnd - l.colStart + 1) * PLEK_CEL_GROOTTE;
      return `<div class="plek-landmark-lijn-sloot" style="left:${left}px; top:${top}px; width:${breedteLijn}px;" title="${escapeAttr(l.title||'Sloot')}"></div>`;
    }
    if(l.type==='lijn-bos'){
      const breedteBos = PLEK_CEL_GROOTTE * 1.6;
      const left = (l.col - 1) * PLEK_CEL_GROOTTE + PLEK_CEL_GROOTTE/2 - breedteBos/2;
      const top = (l.row - 1) * PLEK_CEL_GROOTTE + PLEK_CEL_GROOTTE/2;
      return `<div class="plek-landmark-lijn-bos" style="left:${left}px; top:${top}px; width:${breedteBos}px;" title="${escapeAttr(l.title||'Bos')}"></div>`;
    }
    const left = (l.col - 1) * PLEK_CEL_GROOTTE;
    const top = (l.row - 1) * PLEK_CEL_GROOTTE;
    return `<div class="plek-landmark" style="left:${left}px; top:${top}px;">${escapeHtml(l.label)}</div>`;
  }).join('');

  const totaal = PLATTEGROND_DATA.plekken.length;
  const bezetteEnGereserveerdeCodes = Object.keys(plekBezetting).filter(k=>
    PLATTEGROND_DATA.plekken.some(p=> p.code.toLowerCase()===k || `${p.code.toLowerCase()}a`===k || `${p.code.toLowerCase()}b`===k)
  );
  const bezetAantal = bezetteEnGereserveerdeCodes.filter(k=>plekStatus(getOverlay(plekBezetting[k].id))==='bezet').length;
  const gereserveerdAantal = bezetteEnGereserveerdeCodes.filter(k=>plekStatus(getOverlay(plekBezetting[k].id))==='gereserveerd').length;

  return `
  <div class="card" style="padding:12px;">
    ${renderPlattegrondSubtabs()}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
      <div style="display:flex;gap:12px;font-size:13px;color:var(--text-medium);flex-wrap:wrap;">
        <span><span style="display:inline-block;width:12px;height:12px;background:var(--green);border-radius:3px;margin-right:4px;vertical-align:middle;"></span>Vrij</span>
        <span><span style="display:inline-block;width:12px;height:12px;background:#C9A227;border-radius:3px;margin-right:4px;vertical-align:middle;"></span>Gereserveerd</span>
        <span><span style="display:inline-block;width:12px;height:12px;background:var(--orange);border-radius:3px;margin-right:4px;vertical-align:middle;"></span>Bezet</span>
        <span><span style="display:inline-block;width:12px;height:12px;background:var(--soft-gray);border-radius:3px;margin-right:4px;vertical-align:middle;background-image:repeating-linear-gradient(45deg, rgba(0,0,0,0.3) 0px, rgba(0,0,0,0.3) 1px, transparent 1px, transparent 3px);"></span>Compartimentgrens</span>
        <span><span style="display:inline-block;width:14px;height:5px;background:var(--green);border-radius:3px;margin-right:4px;vertical-align:middle;"></span>Bos</span>
        <span><span style="display:inline-block;width:14px;height:4px;background:#4A90D9;border-radius:2px;margin-right:4px;vertical-align:middle;"></span>Sloot</span>
      </div>
    </div>
    <div style="color:var(--text-medium);font-size:13px;margin-bottom:10px;">
      ${bezetAantal} bezet · ${gereserveerdAantal} gereserveerd · ${totaal - bezetAantal - gereserveerdAantal} vrij · sleep om te scrollen, tik voor details
    </div>
    <div id="plattegrond-scroll" style="overflow:auto;border:1px solid var(--border);border-radius:10px 10px 0 0;-webkit-overflow-scrolling:touch;max-height:60vh;">
      <div style="position:relative;width:${breedte}px;height:${hoogte}px;background:var(--soft-gray);">
        ${landmarks}
        ${plekjes}
      </div>
    </div>
    ${renderPlattegrondStrip()}
  </div>`;
}

function renderPlattegrondStrip(){
  if(!plattegrondSelectedCode){
    return `<div class="plattegrond-strip"><div class="strip-sub" style="margin:0;">Tik op een plek voor details</div></div>`;
  }
  const code = plattegrondSelectedCode;
  const booking = vindBookingVoorCode(code);
  if(booking){
    const status = plekStatus(getOverlay(booking.id));
    const statusTekst = status==='gereserveerd' ? 'gereserveerd' : 'bezet';
    return `<div class="plattegrond-strip">
      <div class="strip-title">Plek ${escapeHtml(code)} — ${escapeHtml(fullName(booking))}</div>
      <div class="strip-sub" style="margin-bottom:10px;">Status: ${statusTekst}</div>
      <button class="btn btn-primary" id="strip-ga-naar-boeking">Ga naar boeking</button>
    </div>`;
  }
  // Vrije plek: zoekveld om direct iemand toe te wijzen
  const resultaten = plattegrondZoekQuery.trim() ? searchBookings(plattegrondZoekQuery) : [];
  return `<div class="plattegrond-strip">
    <div class="strip-title">Plek ${escapeHtml(code)} — vrij</div>
    ${!plattegrondSelectedIsHalf ? `<div class="form-row" style="margin-bottom:10px;">
      <label style="display:flex;align-items:center;gap:10px;font-weight:600;cursor:pointer;font-size:14px;">
        <input type="checkbox" id="strip-halve-checkbox" ${plattegrondHalveCheckbox?'checked':''} style="width:18px;height:18px;">
        Dit is een halve plek (kleine tent)
      </label>
      ${plattegrondHalveCheckbox ? `<div style="display:flex;gap:8px;margin-top:8px;">
        <div class="toggle-btn ${plattegrondHalveSuffix==='a'?'active-star':''}" data-strip-suffix="a" style="cursor:pointer;font-size:13px;">Links (a)</div>
        <div class="toggle-btn ${plattegrondHalveSuffix==='b'?'active-star':''}" data-strip-suffix="b" style="cursor:pointer;font-size:13px;">Rechts (b)</div>
      </div>` : ''}
    </div>` : ''}
    <div class="strip-sub" style="margin-bottom:8px;">Wie wil je hier zetten?</div>
    <input type="text" class="search-input" id="strip-zoek-input" style="font-size:16px;padding:12px 14px;" placeholder="Naam of boekingsnummer…" value="${escapeAttr(plattegrondZoekQuery)}">
    ${resultaten.length ? `<div style="margin-top:10px;max-height:180px;overflow-y:auto;">
      ${resultaten.map(r=>`<div class="sug-item" data-strip-assign-id="${r.id}" style="padding:10px;border-bottom:1px solid var(--border);cursor:pointer;">${escapeHtml(fullName(r))} <span style="color:var(--text-medium);">#${r.id}</span></div>`).join('')}
    </div>` : ''}
  </div>`;
}

function renderPlattegrondSubtabs(){
  return `<div class="diner-subtabs">
    <div class="subtab ${plattegrondMode==='kaart'?'active':''}" data-plattegrond-mode="kaart">🗺️ Kaart</div>
    <div class="subtab ${plattegrondMode==='lijst'?'active':''}" data-plattegrond-mode="lijst">📋 Lijst</div>
  </div>`;
}

function renderPlattegrondLijst(){
  const plekBezetting = {};
  BOOKINGS.forEach(b=>{
    const ov = getOverlay(b.id);
    if(ov.plek && ov.plek.trim()){
      plekBezetting[ov.plek.trim().toLowerCase()] = b;
    }
  });

  // Unieke rij-letters afleiden uit de plekcodes, in logische volgorde
  const alleLetters = [...new Set(PLATTEGROND_DATA.plekken.map(p=>p.code.match(/^[A-Z]+/)[0]))]
    .sort((a,b)=> a.localeCompare(b));

  let plekkenGesorteerd = PLATTEGROND_DATA.plekken.slice().sort((a,b)=>{
    const la = a.code.match(/^[A-Z]+/)[0], lb = b.code.match(/^[A-Z]+/)[0];
    if(la !== lb) return la.localeCompare(lb);
    return parseInt(a.code.slice(la.length)) - parseInt(b.code.slice(la.length));
  });
  if(plattegrondLetterFilter){
    plekkenGesorteerd = plekkenGesorteerd.filter(p=>p.code.match(/^[A-Z]+/)[0] === plattegrondLetterFilter);
  }

  const rijen = plekkenGesorteerd.map(p=>{
    if(isPlekGesplitst(p.code)){
      const bookingA = vindGesplitsteBooking(p.code, 'a');
      const bookingB = vindGesplitsteBooking(p.code, 'b');
      const rijHelft = (suffix, booking)=>{
        const status = booking ? plekStatus(getOverlay(booking.id)) : 'vrij';
        const statusBadgeClass = status==='bezet' ? 'betaal-open' : status==='gereserveerd' ? 'betaal-deels' : 'betaal-betaald';
        const statusLabel = status==='bezet' ? 'Bezet' : status==='gereserveerd' ? 'Gereserveerd' : 'Vrij';
        return `<div class="result-card" ${booking ? `data-lijst-booking-id="${booking.id}"` : ''} style="${booking?'':'cursor:default;'}">
          <div><div class="result-name">${escapeHtml(p.code)}${suffix} <span style="color:var(--text-medium);font-size:12px;">(halve plek)</span></div>
          ${booking ? `<div class="result-sub">${escapeHtml(fullName(booking))} · #${booking.id}</div>` : ''}</div>
          <span class="betaal-badge ${statusBadgeClass}">${statusLabel}</span>
        </div>`;
      };
      return rijHelft('a', bookingA) + rijHelft('b', bookingB);
    }
    const booking = plekBezetting[p.code.toLowerCase()];
    const status = booking ? plekStatus(getOverlay(booking.id)) : 'vrij';
    const statusBadgeClass = status==='bezet' ? 'betaal-open' : status==='gereserveerd' ? 'betaal-deels' : 'betaal-betaald';
    const statusLabel = status==='bezet' ? 'Bezet' : status==='gereserveerd' ? 'Gereserveerd' : 'Vrij';
    return `<div class="result-card" ${booking ? `data-lijst-booking-id="${booking.id}"` : ''} style="${booking?'':'cursor:default;'}">
      <div><div class="result-name">${escapeHtml(p.code)}${p.compartiment ? ' <span style="color:var(--text-medium);font-size:12px;">(compartimentgrens)</span>' : ''}</div>
      ${booking ? `<div class="result-sub">${escapeHtml(fullName(booking))} · #${booking.id}</div>` : ''}</div>
      <span class="betaal-badge ${statusBadgeClass}">${statusLabel}</span>
    </div>`;
  }).join('');

  return `
  <div class="card">
    ${renderPlattegrondSubtabs()}
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;">
      <div class="toggle-btn ${!plattegrondLetterFilter?'active-star':''}" data-letter-filter="">Alles</div>
      ${alleLetters.map(l=>`<div class="toggle-btn ${plattegrondLetterFilter===l?'active-star':''}" data-letter-filter="${l}">${l}</div>`).join('')}
    </div>
    <div id="plattegrond-lijst-results">${rijen}</div>
  </div>`;
}

function attachPlattegrondHandlers(){
  // Scrollpositie herstellen na elke re-render (lost het 'terugspringen' op)
  const scrollEl = document.getElementById('plattegrond-scroll');
  if(scrollEl){
    scrollEl.scrollLeft = plattegrondScrollLeft;
    scrollEl.scrollTop = plattegrondScrollTop;
    scrollEl.addEventListener('scroll', ()=>{
      plattegrondScrollLeft = scrollEl.scrollLeft;
      plattegrondScrollTop = scrollEl.scrollTop;
    });
  }

  // Tikken op een plekje (heel of half) selecteert 'm alleen — geen popup, de strook onderin werkt 'm bij
  document.querySelectorAll('[data-plek-code]').forEach(el=>{
    el.addEventListener('click', ()=>{
      plattegrondSelectedCode = el.getAttribute('data-plek-code');
      plattegrondSelectedIsHalf = el.getAttribute('data-is-half') === '1';
      plattegrondZoekQuery = '';
      plattegrondHalveCheckbox = false;
      plattegrondHalveSuffix = 'a';
      render();
    });
  });

  document.querySelectorAll('[data-plattegrond-mode]').forEach(el=>{
    el.addEventListener('click', ()=>{ plattegrondMode = el.getAttribute('data-plattegrond-mode'); render(); });
  });
  document.querySelectorAll('[data-letter-filter]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const letter = el.getAttribute('data-letter-filter');
      plattegrondLetterFilter = letter ? letter : null;
      render();
    });
  });
  document.querySelectorAll('[data-lijst-booking-id]').forEach(el=>{
    el.addEventListener('click', ()=>{
      activeBookingId = parseInt(el.getAttribute('data-lijst-booking-id'));
      detailExpanded = false;
      tab = 'zoeken';
      render();
    });
  });

  // Info-strook onderin: 'Ga naar boeking' bij bezet/gereserveerd
  const gaNaarBtn = document.getElementById('strip-ga-naar-boeking');
  if(gaNaarBtn) gaNaarBtn.addEventListener('click', ()=>{
    const booking = vindBookingVoorCode(plattegrondSelectedCode);
    if(booking){
      activeBookingId = booking.id;
      detailExpanded = false;
      tab = 'zoeken';
      render();
    }
  });

  // Info-strook onderin: zoeken en direct toewijzen bij een vrije plek
  const stripHalveCheckbox = document.getElementById('strip-halve-checkbox');
  if(stripHalveCheckbox) stripHalveCheckbox.addEventListener('change', e=>{ plattegrondHalveCheckbox = e.target.checked; render(); });
  document.querySelectorAll('[data-strip-suffix]').forEach(el=>{
    el.addEventListener('click', ()=>{ plattegrondHalveSuffix = el.getAttribute('data-strip-suffix'); render(); });
  });

  const stripZoekInput = document.getElementById('strip-zoek-input');
  if(stripZoekInput){
    stripZoekInput.addEventListener('input', e=>{
      plattegrondZoekQuery = e.target.value;
      render();
      setTimeout(()=>{ const i=document.getElementById('strip-zoek-input'); if(i){ i.focus(); i.setSelectionRange(i.value.length,i.value.length);} },0);
    });
  }
  document.querySelectorAll('[data-strip-assign-id]').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(!canEditPlek()){ showToast('Je hebt geen rechten om een plek toe te wijzen'); return; }
      const bookingId = parseInt(el.getAttribute('data-strip-assign-id'));
      const booking = BOOKINGS.find(x=>x.id===bookingId);
      const finaleCode = (!plattegrondSelectedIsHalf && plattegrondHalveCheckbox)
        ? plattegrondSelectedCode + plattegrondHalveSuffix
        : plattegrondSelectedCode;
      const doorgaan = ()=>{
        commitPlekVanuitKaart(bookingId, finaleCode);
      };
      if(heeftBetonWaarschuwing(finaleCode, booking)){
        openBetonWaarschuwing(finaleCode, doorgaan);
      } else {
        doorgaan();
      }
    });
  });
}

/* Directe plek-toewijzing vanuit de kaart (geen overrule-check nodig: plek stond al op vrij) */
function commitPlekVanuitKaart(bookingId, code){
  commitPlek(bookingId, code, true);
  plattegrondZoekQuery = '';
  plattegrondSelectedCode = code;
  plattegrondSelectedIsHalf = /[ab]$/i.test(code);
  plattegrondHalveCheckbox = false;
  render();
}

/* ======================= BEHEER TAB (Admin) ======================= */
let nieuweNaamDraft = '';
function renderBeheer(){
  // Kleine statistieken-samenvatting, handig voor Admin om in één oogopslag de status te zien
  const totaalBoekingen = BOOKINGS.length;
  const metPlek = BOOKINGS.filter(b=>{ const ov=getOverlay(b.id); return ov.plek && ov.plek.trim(); }).length;
  const totaalOpenstaand = BOOKINGS.reduce((sum,b)=>{
    const ov = getOverlay(b.id);
    return sum + ov.bijboekingen.reduce((s,x)=>{
      if(x.status==='open') return s+x.bedrag;
      if(x.status==='deels') return s+Math.max(0,x.bedrag-(x.deelBetaald||0));
      return s;
    },0);
  },0);
  const aantalDinerBoekingen = BOOKINGS.filter(b=>b.dinerDagen>0).length;
  const pendingNotifs = plekNotifs.filter(n=>!n.confirmed).length;

  // Adoptie/gebruik: per persoon sessies tellen en totale actieve tijd optellen
  const gebruikPerPersoon = {};
  sessions.forEach(s=>{
    const key = s.naam;
    if(!gebruikPerPersoon[key]) gebruikPerPersoon[key] = { rol: s.rol, sessies: 0, totaalMs: 0, laatstActief: s.laatsteActiviteit };
    gebruikPerPersoon[key].sessies += 1;
    const duurMs = new Date(s.laatsteActiviteit) - new Date(s.start);
    gebruikPerPersoon[key].totaalMs += Math.max(0, duurMs);
    if(new Date(s.laatsteActiviteit) > new Date(gebruikPerPersoon[key].laatstActief)){
      gebruikPerPersoon[key].laatstActief = s.laatsteActiviteit;
    }
  });
  const gebruikRijen = Object.entries(gebruikPerPersoon)
    .map(([naam, data])=>({ naam, ...data }))
    .sort((a,b)=> b.totaalMs - a.totaalMs);
  function fmtDuur(ms){
    const minuten = Math.round(ms / 60000);
    if(minuten < 60) return `${minuten} min`;
    const uren = Math.floor(minuten / 60);
    const restMin = minuten % 60;
    return `${uren}u ${restMin}min`;
  }

  return `
  <div class="card">
    <div class="section-title">📊 Overzicht</div>
    <div class="info-grid">
      <div class="info-item"><div class="label">Totaal boekingen</div><div class="value">${totaalBoekingen}</div></div>
      <div class="info-item"><div class="label">Plek toegewezen</div><div class="value">${metPlek} / ${totaalBoekingen}</div></div>
      <div class="info-item"><div class="label">Nog te betalen (totaal)</div><div class="value">${fmtEuro(totaalOpenstaand)}</div></div>
      <div class="info-item"><div class="label">Boekingen met diner</div><div class="value">${aantalDinerBoekingen}</div></div>
      <div class="info-item"><div class="label">Onbevestigde plek-meldingen</div><div class="value">${pendingNotifs}</div></div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">📈 Adoptie &amp; gebruik</div>
    <div style="color:var(--text-medium);font-size:14px;margin-bottom:12px;">
      Hoe vaak en hoe lang iedereen actief in de tool zit. Tijd wordt elke minuut bijgewerkt zolang iemand ingelogd is, dus "nu actief" kan een paar minuten vertraging hebben.
    </div>
    ${gebruikRijen.length===0 ? `<div style="color:var(--text-medium);font-size:15px;">Nog geen gebruiksdata.</div>` :
      gebruikRijen.map(r=>`<div class="log-row">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div><b>${escapeHtml(r.naam)}</b> <span style="color:var(--text-medium);font-size:13px;">(${escapeHtml(r.rol)})</span></div>
          <div style="text-align:right;">
            <div style="font-weight:700;">${fmtDuur(r.totaalMs)}</div>
            <div style="font-size:12px;color:var(--text-medium);">${r.sessies} sessie${r.sessies===1?'':'s'}</div>
          </div>
        </div>
        <div class="log-time" style="margin-top:4px;">Laatst actief: ${new Date(r.laatstActief).toLocaleString('nl-NL')}</div>
      </div>`).join('')}
  </div>

  <div class="card">
    <div class="section-title">👥 Teamleden</div>
    <div style="color:var(--text-medium);font-size:14px;margin-bottom:12px;">
      Deze namen verschijnen op het inlogscherm. "Nick" kan niet verwijderd worden (behoudt Admin-toegang).
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;">
      ${TEAM_NAMES.map(n=>`<div class="naast-tag">${escapeHtml(n)} ${n!=='Nick' ? `<span class="remove" data-remove-naam="${escapeHtml(n)}">✕</span>` : ''}</div>`).join('')}
    </div>
    <div class="inline-fields">
      <input type="text" id="nieuwe-naam-input" placeholder="Nieuwe naam…" value="${escapeAttr(nieuweNaamDraft)}">
      <button class="btn btn-secondary" id="add-naam-btn" style="width:auto;flex:0 0 auto;">+ Toevoegen</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">⬇️ Export</div>
    <div style="color:var(--text-medium);font-size:14px;margin-bottom:12px;">
      Download naam, plek, betaalstatus, dieetwensen en opmerkingen als CSV-bestand.
    </div>
    <button class="btn btn-secondary" id="beheer-export-btn">Exporteren als CSV</button>
  </div>

  <div class="card" style="border-color:var(--red);">
    <div class="section-title" style="color:var(--red);">⚠️ Gevarenzone</div>
    <div style="color:var(--text-medium);font-size:14px;margin-bottom:12px;">
      Dit wist alle plekken, bijboekingen, opmerkingen, ster/vlag-markeringen en diner-inchecks van dit event.
      De namenlijst en het activiteitenlog blijven bewaard. Dit kan niet ongedaan gemaakt worden.
    </div>
    <button class="btn btn-danger" id="reset-data-btn">Alle gegevens resetten</button>
  </div>`;
}

function attachBeheerHandlers(){
  const nameInput = document.getElementById('nieuwe-naam-input');
  if(nameInput) nameInput.addEventListener('input', e=>{ nieuweNaamDraft = e.target.value; });

  const addBtn = document.getElementById('add-naam-btn');
  if(addBtn) addBtn.addEventListener('click', async ()=>{
    const naam = nieuweNaamDraft.trim();
    if(!naam){ showToast('Vul een naam in'); return; }
    if(TEAM_NAMES.includes(naam)){ showToast('Deze naam staat al in de lijst'); return; }
    TEAM_NAMES.push(naam);
    await saveTeamNames();
    logAction(`Teamlid "${naam}" toegevoegd door ${currentUser.naam}`);
    nieuweNaamDraft = '';
    showToast(`"${naam}" toegevoegd`);
    render();
  });

  document.querySelectorAll('[data-remove-naam]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const naam = el.getAttribute('data-remove-naam');
      TEAM_NAMES = TEAM_NAMES.filter(n=>n!==naam);
      await saveTeamNames();
      logAction(`Teamlid "${naam}" verwijderd door ${currentUser.naam}`);
      showToast(`"${naam}" verwijderd`);
      render();
    });
  });

  const exportBtn = document.getElementById('beheer-export-btn');
  if(exportBtn) exportBtn.addEventListener('click', doExport);

  const resetBtn = document.getElementById('reset-data-btn');
  if(resetBtn) resetBtn.addEventListener('click', openResetConfirmModal);
}

function openResetConfirmModal(){
  let typedConfirm = '';
  modal = {
    html: `<div class="modal-title">⚠️ Weet je het zeker?</div>
      <div class="warn-box">
        Je staat op het punt om <b>alle plekken, bijboekingen, opmerkingen, ster/vlag-markeringen en diner-inchecks</b>
        van dit event te wissen. Dit geldt voor alle ${BOOKINGS.length} boekingen tegelijk en kan niet ongedaan worden gemaakt.
        Het activiteitenlog en de teamnamenlijst blijven wel bewaard.
      </div>
      <div class="form-row">
        <label>Typ <b>VERWIJDER</b> om te bevestigen</label>
        <input type="text" id="reset-confirm-input" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="reset-cancel">Annuleren</button>
        <button class="btn btn-danger" id="reset-confirm" disabled>Definitief resetten</button>
      </div>`,
    attach: ()=>{
      const confirmBtn = document.getElementById('reset-confirm');
      document.getElementById('reset-cancel').addEventListener('click', closeModal);
      document.getElementById('reset-confirm-input').addEventListener('input', e=>{
        typedConfirm = e.target.value;
        confirmBtn.disabled = typedConfirm.trim() !== 'VERWIJDER';
      });
      confirmBtn.addEventListener('click', async ()=>{
        if(typedConfirm.trim() !== 'VERWIJDER') return;
        confirmBtn.disabled = true; confirmBtn.textContent = 'Bezig…';
        overlay = {};
        dinerState = {};
        plekNotifs = [];
        await saveOverlay();
        await saveDiner();
        await saveNotifs();
        logAction(`⚠️ Alle boekingsgegevens gereset door ${currentUser.naam}`);
        closeModal();
        showToast('Alle gegevens zijn gereset');
        activeBookingId = null;
        render();
      });
    }
  };
  render();
}

/* ======================= DINER TAB ======================= */
function getDinerEntry(day, id){
  if(!dinerState[day]) dinerState[day] = {};
  if(!dinerState[day][id]){
    const b = BOOKINGS.find(x=>x.id===id);
    dinerState[day][id] = { aanwezig:false, aanwezigAantal: b ? b.personen : 0 };
  }
  return dinerState[day][id];
}
function dinerEligible(){ return BOOKINGS.filter(b=>b.dinerDagen>0); }

function renderDiner(){
  if(!dayConfirmed){
    return `
    <div class="card" style="text-align:center;">
      <div class="section-title" style="justify-content:center;">📅 Voor welke dag check je in?</div>
      <div class="day-tabs">
        ${DAYS.map(d=>`<div class="day-tab" data-day="${d}">${d}</div>`).join('')}
      </div>
    </div>`;
  }

  const eligible = dinerEligible();
  const totalExpected = eligible.reduce((s,b)=>s+b.personen,0);
  const totalCheckedIn = eligible.reduce((s,b)=>{ const e=getDinerEntry(selectedDay,b.id); return s+(e.aanwezig?e.aanwezigAantal:0); },0);
  const missing = Math.max(0, totalExpected - totalCheckedIn);

  return `
  <div class="day-picked-bar">
    <div class="day-name">📅 ${selectedDay}</div>
    <div class="change-day" id="change-day">Wijzig dag</div>
  </div>
  <div class="diner-subtabs">
    <div class="subtab ${dinerMode==='inchecken'?'active':''}" data-mode="inchecken">🔍 Inchecken</div>
    <div class="subtab ${dinerMode==='overzicht'?'active':''}" data-mode="overzicht">📋 Volledig overzicht</div>
  </div>
  ${dinerMode==='inchecken' ? renderDinerInchecken() : renderDinerOverzicht()}
  <div class="missing-bar">Nog ${missing} personen niet ingecheckt voor ${selectedDay}</div>
  `;
}

function renderDinerInchecken(){
  const eligible = dinerEligible();
  const suggestions = dinerSearch.trim() ? searchBookings(dinerSearch, eligible) : [];

  return `
  <div class="search-wrap" style="position:static;padding:0 0 10px;">
    <input type="text" class="search-input" id="diner-search" placeholder="Typ naam of nummer…" value="${escapeAttr(dinerSearch)}" autocomplete="off" autofocus>
  </div>
  <div id="diner-quick-list">
    ${suggestions.length===0 && dinerSearch.trim() ? `<div class="empty-state">Geen resultaten</div>` : ''}
    ${suggestions.map(b=>{
      const e = getDinerEntry(selectedDay,b.id);
      return `<div class="quick-row ${e.aanwezig?'quick-row-done':''}" data-quick-checkin="${b.id}">
        <div>
          <div class="diner-name">${escapeHtml(fullName(b))}</div>
          <div class="diner-sub">${b.personen} pers.</div>
        </div>
        <div class="quick-check">${e.aanwezig?'✅':'○'}</div>
      </div>`;
    }).join('')}
  </div>
  `;
}

function renderDinerOverzicht(){
  const eligible = dinerEligible();
  const pool = dinerSearch.trim() ? searchBookings(dinerSearch, eligible) : eligible;
  let filtered = pool;
  if(dinerSubtab==='aanwezig') filtered = pool.filter(b=>getDinerEntry(selectedDay,b.id).aanwezig);
  if(dinerSubtab==='afwezig') filtered = pool.filter(b=>!getDinerEntry(selectedDay,b.id).aanwezig);
  return `
  <div class="search-wrap" style="position:static;padding:0 0 12px;">
    <input type="text" class="search-input" id="diner-search-overzicht" placeholder="Zoek naam of boekingsnummer…" value="${escapeAttr(dinerSearch)}">
  </div>
  <div class="diner-subtabs">
    <div class="subtab ${dinerSubtab==='alle'?'active':''}" data-subtab="alle">Alle (${pool.length})</div>
    <div class="subtab ${dinerSubtab==='aanwezig'?'active':''}" data-subtab="aanwezig">Aanwezig (${pool.filter(b=>getDinerEntry(selectedDay,b.id).aanwezig).length})</div>
    <div class="subtab ${dinerSubtab==='afwezig'?'active':''}" data-subtab="afwezig">Afwezig (${pool.filter(b=>!getDinerEntry(selectedDay,b.id).aanwezig).length})</div>
  </div>
  <div id="diner-list">
    ${filtered.length===0 ? `<div class="empty-state">Geen boekingen gevonden.</div>` : filtered.map(b=>renderDinerRow(b)).join('')}
  </div>`;
}
function renderDinerRow(b, single){
  const e = getDinerEntry(selectedDay, b.id);
  const ov = getOverlay(b.id);
  return `
  ${single ? `<div class="back-link" id="diner-back">← Andere naam zoeken</div>` : ''}
  <div class="diner-row" data-bid="${b.id}">
    <div class="checkin-check ${e.aanwezig?'checked':''}" data-checkin="${b.id}">${e.aanwezig?'✓':''}</div>
    <div style="flex:1;">
      <div class="diner-name">${escapeHtml(fullName(b))}</div>
      <div class="diner-sub">Verwacht: ${b.personen} pers. ${ov.dieet ? '· 🍽️ '+escapeHtml(ov.dieet) : ''}</div>
    </div>
    <div class="stepper">
      <button data-step="${b.id}" data-delta="-1" ${!canEditDiner()?'disabled':''}>−</button>
      <div class="stepper-val">${e.aanwezigAantal}</div>
      <button data-step="${b.id}" data-delta="1" ${!canEditDiner()?'disabled':''}>+</button>
    </div>
  </div>`;
}
function attachDinerHandlers(){
  document.querySelectorAll('.day-tab').forEach(el=>{
    el.addEventListener('click', ()=>{ selectedDay = el.getAttribute('data-day'); dayConfirmed = true; dinerMode='inchecken'; dinerSearch=''; render(); });
  });
  const changeDayEl = document.getElementById('change-day');
  if(changeDayEl) changeDayEl.addEventListener('click', ()=>{ dayConfirmed = false; render(); });

  document.querySelectorAll('[data-mode]').forEach(el=>{
    el.addEventListener('click', ()=>{ dinerMode = el.getAttribute('data-mode'); dinerSearch=''; render(); });
  });

  // Inchecken-mode: instant tap-to-checkin
  const searchEl = document.getElementById('diner-search');
  if(searchEl){
    searchEl.focus();
    searchEl.addEventListener('input', e=>{
      dinerSearch = e.target.value; render();
      setTimeout(()=>{ const i=document.getElementById('diner-search'); if(i){ i.focus(); i.setSelectionRange(i.value.length,i.value.length);} },0);
    });
  }
  document.querySelectorAll('[data-quick-checkin]').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(!canEditDiner()){ showToast('Alleen Diner/Receptie/Admin kunnen dit wijzigen'); return; }
      const id = parseInt(el.getAttribute('data-quick-checkin'));
      const e = getDinerEntry(selectedDay, id);
      e.aanwezig = !e.aanwezig;
      if(e.aanwezig && !e.aanwezigAantal){ const b0=BOOKINGS.find(x=>x.id===id); e.aanwezigAantal = b0.personen; }
      const b = BOOKINGS.find(x=>x.id===id);
      logAction(`${fullName(b)} (#${id}) ${e.aanwezig?'ingecheckt':'uitgecheckt'} voor diner ${selectedDay}`);
      saveDiner();
      dinerSearch = '';
      render();
      setTimeout(()=>{ const i=document.getElementById('diner-search'); if(i) i.focus(); },0);
    });
  });

  // Overzicht-mode search + subtabs
  const searchOverzichtEl = document.getElementById('diner-search-overzicht');
  if(searchOverzichtEl){
    searchOverzichtEl.addEventListener('input', e=>{
      dinerSearch = e.target.value; render();
      setTimeout(()=>{ const i=document.getElementById('diner-search-overzicht'); if(i){ i.focus(); i.setSelectionRange(i.value.length,i.value.length);} },0);
    });
  }
  document.querySelectorAll('.subtab[data-subtab]').forEach(el=>{
    el.addEventListener('click', ()=>{ dinerSubtab = el.getAttribute('data-subtab'); render(); });
  });

  document.querySelectorAll('[data-checkin]').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(!canEditDiner()){ showToast('Alleen Diner/Receptie/Admin kunnen dit wijzigen'); return; }
      const id = parseInt(el.getAttribute('data-checkin'));
      const e = getDinerEntry(selectedDay, id);
      e.aanwezig = !e.aanwezig;
      const b = BOOKINGS.find(x=>x.id===id);
      logAction(`${fullName(b)} (#${id}) ${e.aanwezig?'ingecheckt':'uitgecheckt'} voor diner ${selectedDay}`);
      saveDiner(); render();
    });
  });
  document.querySelectorAll('[data-step]').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(!canEditDiner()) return;
      const id = parseInt(el.getAttribute('data-step'));
      const delta = parseInt(el.getAttribute('data-delta'));
      const e = getDinerEntry(selectedDay, id);
      e.aanwezigAantal = Math.max(0, e.aanwezigAantal + delta);
      saveDiner(); render();
    });
  });
}

/* ======================= EXPORT ======================= */
function doExport(){
  const rows = [['Reservering ID','Naam','Plek','Betaalstatus bijboekingen','Openstaand bedrag','Dieetwensen','Opmerkingen']];
  BOOKINGS.forEach(b=>{
    const ov = getOverlay(b.id);
    const openBedrag = ov.bijboekingen.reduce((s,x)=>{
      if(x.status==='open') return s+x.bedrag;
      if(x.status==='deels') return s+Math.max(0,x.bedrag-(x.deelBetaald||0));
      return s;
    },0);
    let status = 'Geen bijboekingen';
    if(ov.bijboekingen.length){ status = openBedrag>0 ? 'Openstaand' : 'Volledig betaald'; }
    rows.push([b.id, fullName(b), ov.plek||'', status, openBedrag.toFixed(2).replace('.',','), ov.dieet||'', (ov.opmerkingen||'').replace(/\n/g,' ')]);
  });
  const csv = rows.map(r=>r.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `buitengast-overzicht-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  logAction(`Export gedownload door ${currentUser.naam}`);
  showToast('Export gedownload');
}

/* ======================= HELPERS ======================= */
function escapeHtml(str){ if(str===null||str===undefined) return ''; return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(str){ return escapeHtml(str); }

/* ======================= INIT ======================= */
(async function init(){
  try{
    if(localStorage.getItem('buitengast-darkmode')==='1'){
      darkMode = true;
      document.body.classList.add('dark');
    }
  }catch(e){}
  initSupabase();
  const { data: { session } } = await supabaseClient.auth.getSession();
  if(session){ await loadTeamNames(); screen = 'login'; }
  render();
})();
</script>
